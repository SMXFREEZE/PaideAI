/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',sans-serif;background:#FEFDF9;color:#100E0C;overflow-x:hidden}
a{text-decoration:none;color:inherit}

/* ── Design tokens ── */
:root{
  --bg:      #FEFDF9;
  --bg-2:    #F5F0E8;
  --border:  #E4DDD4;
  --ink:     #100E0C;
  --ink-2:   #65605A;
  --ink-3:   #A8A099;
  --accent:  #B5451B;
  --gold:    #B07820;
  --dark:    #0C0A08;
  --dark-2:  #161210;
}

/* ── Keyframes ── */
@keyframes owlFloat{0%,100%{transform:translateY(0) rotate(0)}40%{transform:translateY(-9px) rotate(-1.5deg)}70%{transform:translateY(-4px) rotate(1deg)}}
@keyframes owlBlink{0%,88%,100%{transform:scaleY(0)}93%{transform:scaleY(1)}}
@keyframes beakTalk{0%,100%{transform:scaleY(1)}50%{transform:scaleY(2.5)}}
@keyframes bubbleIn{from{opacity:0;transform:scale(.88) translateY(10px)}to{opacity:1;transform:none}}
@keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes blob1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.08)}}
@keyframes blob2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-20px,30px) scale(.92)}}
@keyframes blob3{0%,100%{transform:translate(0,0) scale(1) rotate(0deg)}50%{transform:translate(10px,10px) scale(1.05) rotate(8deg)}}
@keyframes shimmer{0%,100%{opacity:.03}50%{opacity:.055}}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
/* ── Chameleon color shift ── */
@keyframes chameleonShift{
  0%,100%{filter:hue-rotate(0deg) saturate(1)}
  20%{filter:hue-rotate(25deg) saturate(1.1)}
  40%{filter:hue-rotate(-15deg) saturate(0.95)}
  60%{filter:hue-rotate(40deg) saturate(1.15)}
  80%{filter:hue-rotate(-10deg) saturate(1.05)}
}

/* ── Helpers ── */
.serif{font-family:'DM Serif Display',serif}
.serif-i{font-family:'DM Serif Display',serif;font-style:italic}
.owl-wrap{animation:chameleonShift 12s ease-in-out infinite, owlFloat 5s ease-in-out infinite}
.beak-talk{animation:beakTalk .28s ease-in-out infinite;transform-origin:center top;transform-box:fill-box}
.bubble-wrap{animation:bubbleIn .35s cubic-bezier(.34,1.56,.64,1) both}
.cursor{display:inline-block;width:1.5px;height:.9em;background:currentColor;animation:cursorBlink .8s step-end infinite;vertical-align:-1px;margin-left:1px}
.fade-in{animation:fadeUp .6s ease-out both}

/* ── Gold divider ── */
.gold-rule{width:36px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

/* ── Grain overlay ── */

  mix-blend-mode:overlay;
}

/* ── Responsive hook ─── */
function useIsMobile(bp = 768) {
  const [mob, setMob] = useState(window.innerWidth <= bp);
  useEffect(() => {
    const fn = () => setMob(window.innerWidth <= bp);
    window.addEventListener('resize', fn, { passive: true });
    return () => window.removeEventListener('resize', fn);
  }, [bp]);
  return mob;
}

/* ─────────── SPEECH BUBBLE ─────────────────────────────────────── */
function SpeechBubble({ dark = false }) {
  const [idx, setIdx]     = useState(0);
  const [disp, setDisp]   = useState('');
  const [char, setChar]   = useState(0);
  const [phase, setPhase] = useState('typing');

  useEffect(() => {
    let t;
    const msg = OWL_MSGS[idx];
    if (phase === 'typing') {
      if (char < msg.length) { t = setTimeout(() => { setDisp(msg.slice(0, char + 1)); setChar(c => c + 1); }, 38); }
      else { t = setTimeout(() => setPhase('pause'), 2400); }
    } else if (phase === 'pause') {
      t = setTimeout(() => setPhase('clear'), 350);
    } else {
      if (disp.length > 0) { t = setTimeout(() => setDisp(d => d.slice(0, -2)), 11); }
      else { setIdx(i => (i + 1) % OWL_MSGS.length); setChar(0); setPhase('typing'); }
    }
    return () => clearTimeout(t);
  }, [phase, char, disp, idx]);

  const bg = dark ? 'rgba(255,255,255,0.07)' : '#fff';
  const border = dark ? 'rgba(255,255,255,0.1)' : '#E4DDD4';
  const txtColor = dark ? 'rgba(255,255,255,0.88)' : '#2C2820';

  return (
    <div className="bubble-wrap" style={{
      background: bg, border: `1.5px solid ${border}`,
      borderRadius: '16px 16px 16px 4px',
      padding: '13px 17px', maxWidth: 220, minHeight: 58,
      backdropFilter: dark ? 'blur(12px)' : 'none',
      boxShadow: dark ? '0 8px 32px rgba(0,0,0,0.3)' : '0 6px 24px rgba(176,120,32,0.12)',
      display: 'flex', alignItems: 'center',
    }}>
      <p style={{ fontSize: 13, fontWeight: 500, color: txtColor, lineHeight: 1.5, fontFamily:'Inter,sans-serif' }}>
        {disp}<span className="cursor" style={{ background: dark ? 'rgba(255,255,255,0.5)' : 'var(--ink-3)' }}/>
      </p>
    </div>
  );
}

/* ─────────── NAV ────────────────────────────────────────────────── */
function Nav() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);

  const style = {
    position: 'fixed', top: 0, left: 0, right: 0, zIndex: 50,
    background: scrolled ? 'rgba(12,10,8,0.92)' : 'transparent',
    backdropFilter: scrolled ? 'blur(16px)' : 'none',
    borderBottom: scrolled ? '1px solid rgba(255,255,255,0.06)' : '1px solid transparent',
    transition: 'all 0.25s',

                </div>
              </div>
            );

    </section>
  );
}
