<!DOCTYPE html>
<html><head><meta charset="UTF-8"/><title>Chameleon Test</title>
<style>
body{background:#1a1612;display:flex;align-items:center;justify-content:center;min-height:100vh;gap:40px;flex-wrap:wrap;font-family:sans-serif}
.card{background:#0c0a08;border-radius:16px;padding:40px;text-align:center}
.card h3{color:#fff;margin-top:16px;font-size:14px}
@keyframes owlFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes owlBlink{0%,88%,100%{transform:scaleY(0)}93%{transform:scaleY(1)}}
@keyframes tongueFlick{0%,70%,100%{transform:scaleX(0)}80%{transform:scaleX(1)}}
.float{animation:owlFloat 5s ease-in-out infinite}
</style></head><body>

  <ellipse cx="120" cy="234" rx="58" ry="6" fill="rgba(0,0,0,0.12)"/>

  <ellipse cx="155" cy="196" rx="3.5" ry="2" fill="#3E2208" opacity=".5"/>

  <path d="M203,185 Q208,180 206,183" stroke="#5A3208" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- ═══ TAIL SPIRAL (behind body) ═══ -->

        stroke="#C07830" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- ═══ BACK LEG ═══ -->
  <path d="M92,175 Q89,185 86,200" stroke="#7A4810" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M92,175 Q89,185 86,200" stroke="#A06018" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Back foot toes (zygodactyl) -->
  <path d="M79,202 Q82,197 86,200" stroke="#6A3808" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M86,200 Q90,197 93,202" stroke="#6A3808" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="79" cy="202" r="2" fill="#6A3808"/>
  <circle cx="93" cy="202" r="2" fill="#6A3808"/>

  <!-- ═══ BODY ═══ -->
  <ellipse cx="118" cy="142" rx="56" ry="44" fill="#A06018"/>
  <!-- Body top highlight -->
  <ellipse cx="118" cy="135" rx="48" ry="33" fill="#B07020" opacity=".45"/>

  <!-- Belly (warm golden crescent) -->
  <path d="M70,158 Q118,182 166,158 Q158,174 118,178 Q78,174 70,158Z" fill="#EEC060"/>
  <!-- Belly highlight -->
  <path d="M80,160 Q118,176 156,160 Q150,170 118,173 Q86,170 80,160Z" fill="#F0D070" opacity=".4"/>

  <path d="M150,200 Q154,197 157,202" stroke="#6A3808" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="143" cy="202" r="2" fill="#6A3808"/>
  <circle cx="157" cy="202" r="2" fill="#6A3808"/>

  <!-- ═══ HEAD ═══ -->
  <circle cx="170" cy="118" r="34" fill="#A06018"/>
  <!-- Face lighter area -->
  <circle cx="172" cy="116" r="28" fill="#B87028"/>

  <path d="M175,140 Q192,142 198,132 Q200,128 196,124" fill="#A06018"/>

  <path d="M150,94 Q152,66 164,80" stroke="#8A5015" stroke-width="1.8" fill="none" opacity=".6"/>

  <path d="M152,88 Q154,72 160,80" stroke="#5A3208" stroke-width="1" fill="none" opacity=".3"/>

  <path d="M196,114 Q206,118 204,126 Q202,132 196,134" fill="#B87028"/>

  <path d="M198,128 Q206,128 210,126" stroke="#5A3208" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Nostril -->
  <circle cx="202" cy="118" r="1.8" fill="#5A3208" opacity=".5"/>

  <!-- ═══ TONGUE (for talking state - hidden by default) ═══ -->
  <!-- Uncomment to test: -->
  <!-- <path d="M210,126 Q222,120 230,126 Q234,132 228,136" stroke="#D05030" stroke-width="2.5" fill="none" stroke-linecap="round"/> -->

  <!-- ═══ EYE (most important detail!) ═══ -->
  <!-- Eye turret bump -->
  <circle cx="176" cy="108" r="22" fill="#C07830" opacity=".4"/>
  <!-- Eye white -->
  <circle cx="176" cy="108" r="18" fill="#FFFDF5"/>
  <!-- Iris outer -->
  <circle cx="176" cy="108" r="14" fill="#D09010"/>
  <!-- Iris inner ring -->
  <circle cx="176" cy="108" r="11" fill="#C08010" opacity=".6"/>
  <!-- Pupil -->
  <ellipse cx="176" cy="108" rx="5" ry="7.5" fill="#1A1816"/>
  <!-- Eye highlights -->
  <circle cx="180" cy="103" r="3.5" fill="white"/>
  <circle cx="173" cy="113" r="1.8" fill="white" opacity=".45"/>
  <!-- Eye outer ring -->
  <circle cx="176" cy="108" r="20" fill="none" stroke="#5A3208" stroke-width="2.8"/>

  <!-- Eyelid for blink -->
  <clipPath id="eye-clip"><circle cx="176" cy="108" r="18"/></clipPath>
  <rect x="157" y="90" width="38" height="18" fill="#B87028"
        clip-path="url(#eye-clip)"
        style="animation:owlBlink 5s ease-in-out infinite;transform-origin:center top;transform-box:fill-box"/>

  <!-- ═══ GRADUATION CAP ═══ -->
  <ellipse cx="162" cy="76" rx="24" ry="10" fill="#1A1816" opacity=".92"/>
  <rect x="136" y="68" width="52" height="7" rx="2" fill="#111"/>
  <!-- Tassel -->
  <line x1="184" y1="72" x2="196" y2="50" stroke="#B5451B" stroke-width="2.2"/>
  <circle cx="196" cy="47" r="4.5" fill="#B5451B"/>
  <line x1="194" y1="51" x2="192" y2="62" stroke="#B5451B" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="196" y1="51" x2="196" y2="63" stroke="#B5451B" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="198" y1="51" x2="200" y2="62" stroke="#B5451B" stroke-width="1.4" stroke-linecap="round"/>
</svg>
<h3 style="color:#fff">PaideIA Chameleon Mascot</h3>
