services:
  - type: web
    name: paideia
    runtime: python
    rootDir: professeur-sami
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TUTOR_MODEL
        value: claude-sonnet-4-6
      - key: RATE_LIMIT_PER_MINUTE
        value: "30"
      - key: MAX_UPLOAD_MB
        value: "15"
      - key: MAX_PDF_PAGES
        value: "60"
